# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"
  - "Antigravity IDE"

ai_usage_summary: |
  Used Claude via Antigravity IDE for architecture discussion, code review,
  debugging, and iterative development. All scoring logic, weight tuning,
  and honeypot detection rules were designed through hands-on engineering
  and data analysis. No candidate data was sent to any hosted LLM.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid 4-layer ranker with explicit trap detection. Semantic layer uses
  sentence-transformers (all-mpnet-base-v2) + FAISS for profile-to-JD
  similarity. Structured layer scores title match, skills (weighted by
  proficiency × duration × endorsements), experience fit (Gaussian),
  industry relevance, and education tier. A multiplicative keyword-stuffer
  penalty catches weak-title traps. Behavioral layer integrates RedRob
  platform signals (response rates, GitHub, profile completeness).
  Honeypot detector flags impossible profiles via 7 consistency checks.
  Weights: Structured 40%, Semantic 25%, Behavioral 25%, Bonus 10%.
  Runtime: ~45 seconds for 50 candidates on CPU.

